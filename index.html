<script>(function () {
  const host = location.hostname;
  const isLocal = host === 'localhost' || host === '127.0.0.1'
    || /^100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\./.test(host)  // Tailscale CGNAT 100.64.0.0/10
    || host.endsWith('.ts.net');
  const isOnline = host.endsWith('.github.io');
  const edition = isLocal ? 'local' : (isOnline ? 'online' : 'other');
  const banner = document.getElementById('edition-banner');
  const onlineUrl = "https://casa2024takayama.github.io/strava-report/";
  const localUrl = "http://127.0.0.1:8766/index.html";
  const baseTitle = document.title.replace(/ \[(ローカル|オンライン)\]/g, '');
  if (!banner) return;
  if (edition === 'local') {
    banner.className = 'edition-banner edition-local';
    banner.innerHTML = '💻 <strong>ローカル版</strong>（この Mac · serve_report）'
      + ' — 右上のボタンで更新 · 自動更新なし'
      + ' · <a href="' + onlineUrl + '" target="_blank" rel="noopener">オンライン版を開く</a>';
    document.title = baseTitle + ' [ローカル]';
  } else if (edition === 'online') {
    banner.className = 'edition-banner edition-online';
    banner.innerHTML = '🌐 <strong>オンライン版</strong>（GitHub Pages）'
      + ' — 毎日 23:00 JST 自動更新 · Strava同期ボタン'
      + ' · <a href="' + localUrl + '">ローカル版</a>';
    document.title = baseTitle + ' [オンライン]';
  } else {
    banner.className = 'edition-banner edition-other';
    banner.innerHTML = '⚠️ file:// では更新できません — ターミナルで <code>python3 serve_report.py --open</code> を実行し '
      + '<a href="' + localUrl + '">' + localUrl + '</a> をブックマークしてください';
    document.title = baseTitle + ' [ローカル推奨]';
  }
})();</script>

<script>(function () {
  const panel = document.getElementById('update-panel');
  const btnUpdate = document.getElementById('btn-update');
  const btnCoach = document.getElementById('btn-coach');
  const btnGarmin = document.getElementById('btn-garmin');
  const hint = document.getElementById('update-hint');
  const statusBox = document.getElementById('update-status');
  const statusText = document.getElementById('update-status-text');
  const logEl = document.getElementById('update-log');
  const host = location.hostname;
  const isLocal = host === 'localhost' || host === '127.0.0.1'
    || /^100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\./.test(host)  // Tailscale CGNAT 100.64.0.0/10
    || host.endsWith('.ts.net');
  const isGithubPages = host.endsWith('.github.io');
  const githubPanel = document.getElementById('github-sync-panel');
  const token = "";
  const authHeaders = token ? { 'X-Report-Token': token } : {};
  let pollTimer = null;
  let activeKind = null;

  if (isGithubPages && githubPanel && panel) {
    panel.style.display = 'none';
    githubPanel.style.display = 'flex';
  }

  if (!panel || !btnUpdate || !btnCoach) return;
  if (!isLocal) { return; }

  if (location.protocol === 'file:') {
    hint.textContent = 'file:// では不可 → python3 serve_report.py --open';
  }

  function setButtonsDisabled(disabled) {
    btnUpdate.disabled = disabled;
    btnCoach.disabled = disabled;
    if (btnGarmin) btnGarmin.disabled = disabled;
  }
  function setStatus(msg, isError, isSuccess) {
    statusBox.classList.add('visible');
    statusBox.classList.toggle('error', !!isError);
    statusBox.classList.toggle('success', !!isSuccess);
    statusText.textContent = msg;
  }
  function stopPoll() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }
  function stepLabel(data) {
    const labels = { starting:'準備中…', fetch:'Strava から取得中…', coach:'Claude が評価中…',
      garmin:'Garmin から取得中…（数分かかります）', html:'HTML 再生成中…', done:'完了', error:'エラー' };
    return labels[data.step] || data.step;
  }
  async function pollStatus() {
    try {
      const res = await fetch('/api/status', { headers: authHeaders });
      const data = await res.json();
      const kind = data.kind || activeKind;
      const isSuccess = data.done && !data.running && !data.error;
      if (!isSuccess) { setStatus(stepLabel(data), !!data.error, false); }
      logEl.textContent = (data.log || []).slice(-12).join('\n');
      if (data.error) { setButtonsDisabled(false); stopPoll(); return; }
      if (data.done && !data.running) {
        stopPoll();
        if (kind === 'coach') {
          const ts = data.last_coach || '';
          setStatus(ts ? ('✓ AI コーチング完了 — ' + ts) : '✓ AI コーチング完了', false, true);
          const lastCoachEl = document.getElementById('last-coach-msg');
          if (lastCoachEl && ts) { lastCoachEl.className = 'last-coach ok'; lastCoachEl.textContent = '✓ 最終 AI 評価: ' + ts; }
        } else if (kind === 'garmin') {
          setStatus('✓ Garmin 取得・レポート再生成 完了', false, true);
          const lg = document.getElementById('last-garmin-msg');
          if (lg) lg.className = 'last-garmin ok';
        } else {
          const ts = data.last_fetch || '';
          setStatus(ts ? ('✓ 更新完了 — データ ' + ts) : '✓ 更新完了', false, true);
          const lastFetchEl = document.getElementById('last-fetch-msg');
          if (lastFetchEl && ts) { lastFetchEl.className = 'last-fetch ok'; lastFetchEl.textContent = '✓ 最終データ取得: ' + ts; }
          const coachTs = data.last_coach || '';
          const lastCoachEl = document.getElementById('last-coach-msg');
          if (lastCoachEl && coachTs) { lastCoachEl.className = 'last-coach ok'; lastCoachEl.textContent = '✓ 最終 AI 評価: ' + coachTs; }
          const warnEl = document.getElementById('last-coach-warn');
          if (warnEl) warnEl.remove();
        }
        setTimeout(function(){ location.reload(); }, 2500);
      }
    } catch (e) {
      setStatus('サーバーに接続できません', true, false);
      setButtonsDisabled(false);
      stopPoll();
    }
  }
  function warnFileProtocol() {
    alert('file:// では実行できません。\n\nターミナルで:\n  cd ~/Projects/strava-report\n  python3 serve_report.py --open\n\nを実行し、http://127.0.0.1:8766/index.html を開いてください。');
  }
  async function startJob(endpoint, kind, startMsg) {
    if (location.protocol === 'file:') { warnFileProtocol(); return; }
    activeKind = kind;
    setButtonsDisabled(true);
    setStatus(startMsg, false, false);
    logEl.textContent = '';
    try {
      const res = await fetch(endpoint, { method: 'POST', headers: authHeaders });
      const data = await res.json();
      if (!data.started) {
        setStatus(data.message || 'すでに処理が実行中です', false, false);
        if (data.message) logEl.textContent = data.message;
        setButtonsDisabled(false);
        return;
      }
      stopPoll();
      pollTimer = setInterval(pollStatus, 1500);
      pollStatus();
    } catch (e) {
      setStatus('API に接続できません。serve_report.py が起動しているか確認してください。', true, false);
      setButtonsDisabled(false);
    }
  }
  btnUpdate.addEventListener('click', function(){ startJob('/api/update', 'fetch', 'データ更新を開始しています…'); });
  btnCoach.addEventListener('click', function(){ startJob('/api/coach', 'coach', 'AI 評価を開始しています…（Claude API）'); });
  if (btnGarmin) { btnGarmin.addEventListener('click', function(){ startJob('/api/garmin', 'garmin', 'Garmin から取得を開始しています…（数分かかります）'); }); }
})();</script>

: "5km", "distKm": 5.0, "desc": "軽いジョグ。6:10〜6:30/km、HR 130bpm以下。脚の感触を確認"}, {"id": "d0722", "date": "7/22", "dow": "水", "zone": "E", "dist": "4km", "distKm": 4.0, "desc": "10〜15分の軽いジョグ＋ストライドを2〜3本（20秒間の軽いピックアップ）。神経系の活性化のみ"}, {"id": "d0723", "date": "7/23", "dow": "木", "zone": "移動", "dist": "—", "distKm": 0.0, "desc": "富士登山競走 移動日・受付。歩行以外の運動なし。水分・睡眠・食事を最優先"}, {"id": "d0724", "date": "7/24", "dow": "金", "zone": "レース", "dist": "21.4km", "distKm": 21.4, "desc": "🏔️ 富士登山競走 頂上コース（21.4km）。前半は設定ペースを守り省エネ走。8合目以降は高山病・低体温に注意し無理をしない"}, {"id": "d0725", "date": "7/25", "dow": "土", "zone": "休養", "dist": "—", "distKm": 0.0, "desc": "完全休養。下山後の筋ダメージ（DOMS）が最大のため安静"}, {"id": "d0726", "date": "7/26", "dow": "日", "zone": "休養", "dist": "—", "distKm": 0.0, "desc": "完全休養または非常に軽いウォーク。HR が通常より高めなら運動禁止"}, {"id": "d0727", "date": "7/27", "dow": "月", "zone": "E", "dist": "4km", "distKm": 4.0, "desc": "状態を確認しながら非常に軽いジョグ。痛みがあれば中止。6:30/km以上"}], "current": false}, {"num": 5, "numLabel": "第5週", "range": "7/28〜7/31", "theme": "レース後回復", "target": "30km", "days": [{"id": "d0728", "date": "7/28", "dow": "火", "zone": "E", "dist": "8km", "distKm": 8.0, "desc": "回復ジョグ。6:00〜6:20/km、HR 135bpm以下。筋の状態を確認"}, {"id": "d0729", "date": "7/29", "dow": "水", "zone": "休養", "dist": "—", "distKm": 0.0, "desc": "完全休養"}, {"id": "d0730", "date": "7/30", "dow": "木", "zone": "E", "dist": "12km", "distKm": 12.0, "desc": "徐々に距離を戻す。5:50〜6:10/km、HR 140bpm以下"}, {"id": "d0731", "date": "7/31", "dow": "金", "zone": "E", "dist": "10km", "distKm": 10.0, "desc": "6:00〜6:10/km。7月を締めくくる軽めのE走"}], "current": false}], "weekTargets": {"1": 36.0, "2": 42.0, "3": 33.0, "4": 34.0, "5": 30.0}, "note": "月間プランは前月AIレビュー生成時に更新されます"}, "coach": {"verdict": {"kicker": "AI 月次コーチング ・ 2026年7月レビュー", "headline": "マラソンコーチングレポート — 2026年7月", "points": [{"sym": "•", "color": "#D6D3CE", "text": "総距離: 40.8 km / 4 回"}, {"sym": "•", "color": "#D6D3CE", "text": "平均心拍数: 146 bpm"}, {"sym": "•", "color": "#D6D3CE", "text": "第1週: 28.5 km"}]}, "sections": [{"id": "review", "title": "月次レビュー", "meta": "claude-sonnet-4-6（Claude API）", "body": "<h3>2026年7月 ランニングレビュー<\/h3>\n<hr>\n<h3>1. 月間総評<\/h3>\n<p><strong>現時点（7/10）の評価：進捗ペースは目標を大きく下回っているが、理由がある<\/strong><\/p>\n<p>7月10日時点で40.8km走行。経過日数32%に対するペース基準は約64kmなので、現状は基準の<strong>64%程度<\/strong>にとどまっています。このペースが続くと月末時点の見込みは約128km（目標比▲72km）となり、200km達成には残り21日で約159kmが必要です。<\/p>\n<p>しかし、数字以上に深刻なのは<strong>Garminの生理指標が示す身体の状態<\/strong>です。<\/p>\n<ul>\n<li>トレーニングステータス：STRAINED×7、UNPRODUCTIVE×3（月内）<\/li>\n<li>トレーニングレディネス：平均20/100（範囲1〜44）<\/li>\n<li>HRVステータス：UNBALANCED 6日<\/li>\n<li>睡眠：平均5.3時間、スコア56<\/li>\n<li>安静時心拍：50→43bpm（低下は疲労蓄積の可能性）<\/li>\n<\/ul>\n<p>これらは<strong>慢性的な疲労蓄積・オーバーリーチの典型的な兆候<\/strong>です。練習回数は月4回と少ないにもかかわらずSTRAINED判定が続いているのは、睡眠不足と回復不足が根本にあります。距離を無理に積み上げようとすると故障リスクが急上昇するため、残り21日は「質を保ちながら安全に距離を増やす」アプローチが最優先です。<\/p>\n<p><strong>良い点：<\/strong> VO2max 57.2は高水準で走力ポテンシャルは十分。イージーゾーンでの走行が複数確認でき、完全に暴走しているわけではない。<\/p>\n<p><strong>課題：<\/strong> 睡眠改善が急務。5.3時間では筋肉・神経系の回復が成立しません。<\/p>\n<hr>\n<h3>2. 週別評価<\/h3>\n<h4>第1週（7/2〜7/7）：28.5km<\/h4>\n<p>3回の練習を実施。内容はナイトランが中心で、練習時間帯・睡眠時間との関係に注意が必要です。<\/p>\n<p><strong>評価：<\/strong> 7/2のNight Runと7/5の2部練（Evening Run + Night Run）を合わせた28.5kmは体積として悪くありません。ただし同日2部練はトレーニングレディネスが低い状態では負担が大きい。Evening RunでHR 185〜188bpmという高強度域に達しており、その疲労が蓄積した状態でNight Runを追加した判断は疑問が残ります。週間距離としては目標40kmには届いていませんが、現在の体調を考えれば無理をしなかったことは結果的に適切でした。<\/p>\n<h4>第2週（7/8〜7/10）：12.3km（第2週途中）<\/h4>\n<p>7/8の1本のみ（現時点）。12.3kmは7/10時点なので週途中ですが、今週はここまでイージーに徹しており内容は良好です。<\/p>\n<p><strong>評価：<\/strong> 7/8の走りはラップを見ると非常に安定しており（後述）、疲弊した身体を丁寧に使えています。今週残り（7/11〜7/13）でもう1〜2本追加できれば週30〜35km前後を目指しましょう。<\/p>\n<hr>\n<h3>3. 個別アクティビティコメント<\/h3>\n<h4>✅ 2026-07-08 夜のランニング（12.3km / 5:52/km / HR 136）<\/h4>\n<p><strong>今月最も完成度の高い練習です。<\/strong><\/p>\n<p>ラップを見ると、Lap1の6:12/km・HR119から始まり、Lap4以降は5:49〜5:55/kmの範囲でHRも136〜141bpmに安定。後半もペースダウンせず5:40〜5:41/kmで締めています。HRmax 57.2のVO2maxを持つランナーのイージーペース（5:40〜6:00/km前後）として非常に適切。<\/p>\n<p>ただし、Lap11・14の中断（0.18km・0.09km）はコース上の信号や休憩と思われますが、走行中断後の再スタートでペースが乱れていない点は良いアジャストです。<\/p>\n<p><strong>改善点：<\/strong> ほぼなし。このペース・強度での長距離（16〜20km）を週1回組み込めると基礎有酸素力がさらに伸びます。<\/p>\n<hr>\n<h4>⚠️ 2026-07-05 Evening Run（14.0km / 4:44/km / HR 160）<\/h4>\n<p><strong>後半の急加速が最大の問題点です。<\/strong><\/p>\n<p>ラップ推移を分析すると：<\/p>\n<ul>\n<li>Lap1〜5：5:53〜5:19/km、HR127〜145bpm → イージー〜Mゾーン<\/li>\n<li>Lap6：4:43/km、HR158 → Tゾーン入り<\/li>\n<li>Lap7〜8：4:18〜4:13/km、HR171〜175 → Iゾーン<\/li>\n<li>Lap9〜10：4:04〜4:07/km、HR180 → <strong>最大心拍域<\/strong><\/li>\n<li>Lap13〜14：4:02〜4:05/km、HR185〜188 → <strong>HR188はVO2maxを超える領域<\/strong><\/li>\n<\/ul>\n<p>つまり「イージー走のつもりが気づいたらレースペースに」という典型的なパターンです。VO2max 57.2のランナーの最大心拍数が仮に200bpm前後とすると、HR188は97%に相当し、インターバル走に匹敵する強度です。<\/p>\n<p>さらに問題なのはこの直後にNight Runを実施していること。疲弊した状態での追加走は回復を著しく妨げます。<\/p>\n<p><strong>改善点：<\/strong> イージー走はGarminのHRアラートを設定し、HRmax×74%（仮に148bpm以下）を超えたら意識的にペースを落とす。「気持ちよくなってきたら注意」のサインとして使いましょう。<\/p>\n<hr>\n<h4>△ 2026-07-05 Night Run（4.2km / 6:14/km / HR 153）<\/h4>\n<p>Evening Run後の追加走。ラップ中盤（Lap3〜10）に短距離の高速ダッシュ（3:06〜3:30/km）と停止（7:34〜9:43/km）が交互に現れており、<strong>ドリル・流し・または信号多数区間<\/strong>と推測されます。<\/p>\n<p>距離は4.2kmと短く、追加のダメージは限定的ですが、タイミングが問題。Evening Runで既にHR185超まで追い込んだ直後のこの走りは、交感神経系のさらなる疲弊につながります。<\/p>\n<p><strong>改善点：<\/strong> 2部練を行う場合は「朝イージー＋夜ドリル」など、強度の低い方を後半に持ってくること。<\/p>\n<hr>\n<h4>○ 2026-07-02 Night Run（10.3km / 5:48/km / HR 137）<\/h4>\n<p>全体的にはイージー走として機能しています。Lap1〜5は5:30〜6:07/kmでHR121〜134bpとコントロールされていますが、Lap6で突然4:49/km・HR164に急上昇。その後Lap8〜17でインターバル様の短距離繰り返し（3:21〜3:50/kmの疾走＋7:17〜8:14/kmの歩行/緩走）が出現しています。<\/p>\n<p>この構造を見ると<strong>非公式なファルトレク的な走り<\/strong>を取り入れたようですが、事前に計画した強度設定ではないように見えます。気分次第の強度変化より、目的に沿った練習設計を意識しましょう。<\/p>\n<hr>\n<h3>4. ペース・心拍分析<\/h3>\n<h4>VDOT推定<\/h4>\n<p>VO2max 57.2はダニエルズVDOTとほぼ同等と見なせます。VDOT57に対応する各ゾーンのペース目安は以下の通りです：<\/p>\n<table class=\"md-table\"><tbody>\n<tr><th>ゾーン<\/th><th>ペース目安<\/th><th>心拍目安（HRmax≈200想定）<\/th><\/tr>\n<tr><td>E（イージー）<\/td><td>5:30〜6:10/km<\/td><td>118〜148bpm<\/td><\/tr>\n<tr><td>M（マラソンペース）<\/td><td>4:39〜4:45/km<\/td><td>150〜168bpm<\/td><\/tr>\n<tr><td>T（テンポ）<\/td><td>4:20〜4:26/km<\/td><td>166〜176bpm<\/td><\/tr>\n<tr><td>I（インターバル）<\/td><td>3:55〜4:05/km<\/td><td>194〜200bpm<\/td><\/tr>\n<\/tbody><\/table>\n<h4>今月のゾーン配分（推定）<\/h4>\n<p>Evening Runの後半（4:02〜4:07/km・HR180〜188）はIゾーン相当が4km以上。加えてドリル様疾走が数本。対してイージー走は7/8と7/2の前半部分のみ。<\/p>\n<p><strong>80/20のバランスが完全に崩れており、高強度比率が30〜40%程度に達しています。<\/strong> これが「STRAINED」「UNPRODUCTIVE」の連続判定の直接原因です。VO2maxが横ばい（57.2→57.2）なのも、強度過多によりオーバーリーチ状態に陥り適応が起きていないことを示しています。<\/p>\n<h4>安静時心拍の低下について<\/h4>\n<p>50→43bpmへの低下は副交感神経優位の適応（良い兆候）とも読めますが、慢性疲労による心拍変動の抑制という可能性もあり、HRV不均衡・睡眠不足と合わせて考えると<strong>後者のリスクが高い<\/strong>と判断します。当面は強度を抑えた回復期間が必要です。<\/p>\n<hr>\n<h3>5. 2026年8月の練習提案<\/h3>\n<h4>月間方針<\/h4>\n<p>8月はGarminの疲労指標（STRAINED連続・レディネス平均20・HRV不均衡・睡眠不足）を踏まえ、<strong>前半2週を「回復と再構築」、後半2週を「量の積み上げ」<\/strong> という2フェーズで組みます。<\/p>\n<ul>\n<li>月間200km・週平均40km（5週：第1〜5週に分割）<\/li>\n<li>8月は5週構成（8/1〜8/3が第1週の残り扱い、または下記のように7日区切り）<\/li>\n<li><strong>クオリティ練習は週1回上限（前半2週）→ 週2回（後半2週）<\/strong> ※レディネスが回復した場合のみ<\/li>\n<li>全走行の80%以上はEゾーン（HR148bpm以下を厳守）<\/li>\n<li>ロング走は週1回・最長18〜20km・3時間以内<\/li>\n<li>睡眠7時間確保を最優先。就寝をナイトランより優先する<\/li>\n<\/ul>\n<h4>週別・日別メニュー<\/h4>\n<h5>第1週（8/1〜8/3）：回復リスタート 目標12km<\/h5>\n<blockquote class=\"md-quote\">7月後半（7/11〜7/31）で十分距離を積み、8月は第2週から本格始動。第1週は土日のみ短めのイージーで身体をリセット。<\/blockquote>\n<table class=\"md-table\"><tbody>\n<tr><th>曜<\/th><th>日付<\/th><th>種別<\/th><th>距離<\/th><th>内容<\/th><\/tr>\n<tr><td>土<\/td><td>8/1<\/td><td>E<\/td><td>6km<\/td><td>イージー 6:00〜6:20/km・HR145以下で感覚確認<\/td><\/tr>\n<tr><td>日<\/td><td>8/2<\/td><td>E<\/td><td>6km<\/td><td>イージー 6:00〜6:20/km・前日との回復比較<\/td><\/tr>\n<tr><td>月<\/td><td>8/3<\/td><td>休養<\/td><td>—<\/td><td>完全休養<\/td><\/tr>\n<\/tbody><\/table>\n<blockquote class=\"md-quote\">※8/3（月）は第2週月曜に含めて扱います<\/blockquote>\n<h5>第2週（8/4〜8/10）：回復ベース 目標35km<\/h5>\n<blockquote class=\"md-quote\">レディネスが低い段階のため、全走行をEゾーンに徹する。クオリティ1本のみ（レディネス40以上の場合のみ実施）。<\/blockquote>\n<table class=\"md-table\"><tbody>\n<tr><th>曜<\/th><th>日付<\/th><th>種別<\/th><th>距離<\/th><th>内容<\/th><\/tr>\n<tr><td>月<\/td><td>8/4<\/td><td>休養<\/td><td>—<\/td><td>完全休養・睡眠優先<\/td><\/tr>\n<tr><td>火<\/td><td>8/5<\/td><td>E<\/td><td>8km<\/td><td>イージー 5:50〜6:10/km・HR145以下<\/td><\/tr>\n<tr><td>水<\/td><td>8/6<\/td><td>休養<\/td><td>—<\/td><td>完全休養<\/td><\/tr>\n<tr><td>木<\/td><td>8/7<\/td><td>E<\/td><td>8km<\/td><td>イージー 5:50〜6:10/km・HR145以下<\/td><\/tr>\n<tr><td>金<\/td><td>8/8<\/td><td>休養<\/td><td>—<\/td><td>完全休養<\/td><\/tr>\n<tr><td>土<\/td><td>8/9<\/td><td>E<\/td><td>10km<\/td><td>イージー 5:50〜6:10/km・後半2kmのみ自然なペースアップ可<\/td><\/tr>\n<tr><td>日<\/td><td>8/10<\/td><td>ロングE<\/td><td>12km<\/td><td>ゆっくりロング 6:00〜6:20/km・HR145以下・会話ペース厳守<\/td><\/tr>\n<tr><td><strong>合計<\/strong><\/td><td><\/td><td><\/td><td><strong>38km<\/strong><\/td><td><\/td><\/tr>\n<\/tbody><\/table>\n<h5>第3週（8/11〜8/17）：ベース構築 目標42km<\/h5>\n<blockquote class=\"md-quote\">HRV・レディネスの改善を確認できた場合、週1回のT走を追加。睡眠7時間が2〜3日取れていることが前提条件。<\/blockquote>\n<table class=\"md-table\"><tbody>\n<tr><th>曜<\/th><th>日付<\/th><th>種別<\/th><th>距離<\/th><th>内容<\/th><\/tr>\n<tr><td>月<\/td><td>8/11<\/td><td>休養<\/td><td>—<\/td><td>完全休養<\/td><\/tr>\n<tr><td>火<\/td><td>8/12<\/td><td>E<\/td><td>10km<\/td><td>イージー 5:45〜6:00/km・HR148以下<\/td><\/tr>\n<tr><td>水<\/td><td>8/13<\/td><td>T<\/td><td>10km<\/td><td>ウォームアップE 3km＋T走4km（4:20〜4:26/km）＋クールダウンE 3km<\/td><\/tr>\n<tr><td>木<\/td><td>8/14<\/td><td>休養<\/td><td>—<\/td><td>完全休養（T走翌日は必ず休養）<\/td><\/tr>\n<tr><td>金<\/td><td>8/15<\/td><td>E<\/td><td>8km<\/td><td>イージー 5:50〜6:10/km<\/td><\/tr>\n<tr><td>土<\/td><td>8/16<\/td><td>E<\/td><td>10km<\/td><td>イージー 5:45〜6:00/km<\/td><\/tr>\n<tr><td>日<\/td><td>8/17<\/td><td>ロングE<\/td><td>14km<\/td><td>ゆっくりロング 6:00〜6:15/km・HR145以下・最後まで会話ペース<\/td><\/tr>\n<tr><td><strong>合計<\/strong><\/td><td><\/td><td><\/td><td><strong>52km<\/strong><\/td><td><\/td><\/tr>\n<\/tbody><\/table>\n<blockquote class=\"md-quote\">⚠️ T走実施の判断基準：当日のレディネス≥50、HRVステータスがBALANCED。どちらか未達の場合はEゾーン10kmに差し替え。<\/blockquote>\n<h5>第4週（8/18〜8/24）：積み上げ 目標50km<\/h5>\n<blockquote class=\"md-quote\">身体が適応してきたことを確認した上で量と質を同時に高める週。ロング走を16kmに伸ばす。<\/blockquote>\n<table class=\"md-table\"><tbody>\n<tr><th>曜<\/th><th>日付<\/th><th>種別<\/th><th>距離<\/th><th>内容   function initMap(a){
    if (!a.mapCoords || mapInited[a.id]) return;
    if (typeof L === 'undefined') return;
    try {
      const m = L.map(a.mapId, { zoomControl:true, attributionControl:false });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
      const poly = L.polyline(a.mapCoords, { color:a.mapColor||'#FC4C02', weight:3, opacity:0.85 }).addTo(m);
      m.fitBounds(poly.getBounds(), { padding:[12,12] });
      L.circleMarker(a.mapCoords[0], { radius:6,color:'#fff',fillColor:'#22c55e',fillOpacity:1,weight:2 }).addTo(m);
      L.circleMarker(a.mapCoords[a.mapCoords.length-1], { radius:6,color:'#fff',fillColor:'#ef4444',fillOpacity:1,weight:2 }).addTo(m);
      mapInited[a.id] = true;
      setTimeout(function(){ m.invalidateSize(); }, 60);
    } catch(e){}
  }

  function setTab(tab){
    if (TABS.indexOf(tab) < 0) tab = 'today';
    state.tab = tab;
    try { localStorage.setItem('rr2-tab', tab); } catch(e){}
    if (location.hash !== '#'+tab){ try { history.replaceState(null,'','#'+tab); } catch(e){ location.hash = tab; } }
    document.querySelectorAll('.rr-tab').forEach(function(b){
      const active = b.getAttribute('data-tab') === tab;
      b.style.color = active ? '#1C1917' : '#78716C';
      b.style.borderBottom = active ? '3px solid #FC4C02' : '3px solid transparent';
    });
    TABS.forEach(function(k){ document.getElementById('tab-'+k).style.display = (k===tab) ? 'flex' : 'none'; });
  }

  renderToday(); renderPlan(); renderCoach(); renderRecords();
  document.querySelectorAll('.rr-tab').forEach(function(b){ b.addEventListener('click', function(){ setTab(b.getAttribute('data-tab')); }); });
  window.addEventListener('hashchange', function(){ const t = (location.hash||'').replace('#',''); if (TABS.indexOf(t)>=0 && t!==state.tab) setTab(t); });
  let start = (location.hash||'').replace('#','');
  if (TABS.indexOf(start) < 0){ try { start = localStorage.getItem('rr2-tab') || 'today'; } catch(e){ start = 'today'; } }
  setTab(start);

  // スクロールでヘッダーを折りたたむ（モバイルで面積を圧縮。ヒステリシスでちらつき防止）
  (function(){
    const header = document.querySelector('.rr-header');
    if (!header) return;
    let collapsed = false, ticking = false;
    function apply(){
      ticking = false;
      const y = window.scrollY || document.documentElement.scrollTop || 0;
      const want = collapsed ? (y > 60) : (y > 110);
      if (want !== collapsed){ collapsed = want; header.classList.toggle('rr-collapsed', collapsed); }
    }
    window.addEventListener('scroll', function(){
      if (!ticking){ ticking = true; window.requestAnimationFrame(apply); }
    }, { passive: true });
    apply();
  })();
})();

</script>
</body>
